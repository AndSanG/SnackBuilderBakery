services:
  api:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
